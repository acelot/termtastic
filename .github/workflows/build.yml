name: Termtastic Pipeline

on:
  push:
    branches: [ master ]
    tags:
      - "v*"
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GIT_REF_TYPE: ${{ github.ref_type }}
  GIT_REF_NAME: ${{ github.ref_name }}
  GIT_SHA: ${{ github.sha }}

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      attestations: write
      contents: write
    env:
      BINARY_NAME: ${{ matrix.binary_name }}
      ARCHIVE_NAME: termtastic-${{ matrix.target }}${{ matrix.archive_ext }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: .zip
            binary_name: termtastic.exe

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            archive_ext: .tar.gz
            binary_name: termtastic

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_ext: .tar.gz
            binary_name: termtastic

          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: .tar.gz
            binary_name: termtastic

          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: .tar.gz
            binary_name: termtastic

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true
          profile: minimal

      - name: Install system dependencies for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp target/${{ matrix.target }}/release/termtastic.exe ${{ env.BINARY_NAME }}

      - name: Prepare binary (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/termtastic ${{ env.BINARY_NAME }}
          chmod +x ${{ env.BINARY_NAME }} || true

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: 7z a -tzip ${{ env.ARCHIVE_NAME }} ${{ env.BINARY_NAME }}

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: tar czf ${{ env.ARCHIVE_NAME }} ${{ env.BINARY_NAME }}

      - name: Attest archive
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.ARCHIVE_NAME }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ env.ARCHIVE_NAME }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: false
          files: |
            artifacts/**/*
