name: Termtastic Pipeline

on:
  push:
    branches: [ master ]
    tags:
      - "v*"
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  BINARY_NAME: termtastic
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GIT_REF_TYPE: ${{ github.ref_type }}
  GIT_REF_NAME: ${{ github.ref_name }}
  GIT_SHA: ${{ github.sha }}

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-2025
            archive_ext: zip
            archive_cmd: |
              7z a -tzip ${BINARY_NAME}-${MATRIX_TARGET}.zip ${BINARY_NAME}.exe
            binary_ext: .exe

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            archive_ext: tar.gz
            archive_cmd: tar -czf ${BINARY_NAME}-${MATRIX_TARGET}.tar.gz ${BINARY_NAME}
            binary_ext: ""

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_ext: tar.gz
            archive_cmd: tar -czf ${BINARY_NAME}-${MATRIX_TARGET}.tar.gz ${BINARY_NAME}
            binary_ext: ""

          - target: x86_64-apple-darwin
            os: macos-15
            archive_ext: tar.gz
            archive_cmd: tar -czf ${BINARY_NAME}-${MATRIX_TARGET}.tar.gz ${BINARY_NAME}
            binary_ext: ""

          - target: aarch64-apple-darwin
            os: macos-15
            archive_ext: tar.gz
            archive_cmd: tar -czf ${BINARY_NAME}-${MATRIX_TARGET}.tar.gz ${BINARY_NAME}
            binary_ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true
          profile: minimal

      - name: Install system dependencies for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary for packaging
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          BINARY_EXT: ${{ matrix.binary_ext }}
        run: |
          cp target/${MATRIX_TARGET}/release/${BINARY_NAME}${BINARY_EXT} .
          chmod +x ${BINARY_NAME}${BINARY_EXT} || true

      - name: Create archive
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: ${{ matrix.archive_cmd }}

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive_ext }}
          retention-days: 7

      - name: Attest archive
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive_ext }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: false
          files: |
            artifacts/**/*
