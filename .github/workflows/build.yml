name: Termtastic Pipeline

on:
  push:
    branches: [ master ]
    tags:
      - "v*"
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GIT_REF_TYPE: ${{ github.ref_type }}
  GIT_REF_NAME: ${{ github.ref_name }}
  GIT_SHA: ${{ github.sha }}

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact_name: termtastic.exe
            asset_name: termtastic-windows-x86-64.exe

          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_name: termtastic
            asset_name: termtastic-linux-x86-64

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: termtastic
            asset_name: termtastic-linux-aarch64

          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: termtastic
            asset_name: termtastic-darwin-x86-64

          - os: macos-15
            target: aarch64-apple-darwin
            artifact_name: termtastic
            asset_name: termtastic-darwin-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true
          profile: minimal

      - name: Install system dependencies for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip debug symbols (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          if-no-files-found: error

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*

      - name: Attest artifacts
        uses: actions/attest@v4
        with:
          subject-path: artifacts/termtastic-*
